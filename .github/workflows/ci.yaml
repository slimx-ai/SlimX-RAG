name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install deps
        run: |
          uv sync --group dev

      - name: Lint
        run: |
          uv run ruff check .

      - name: Type check
        if: matrix.python-version == '3.12'
        run: |
          uv run mypy

      - name: Run tests
        run: |
          uv run pytest -q --cov=slimx_rag --cov-report=term-missing

      - name: Build package
        run: |
          uv run python -m build
